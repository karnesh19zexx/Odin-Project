<!DOCTYPE html>
<html lang = "Eng">
    <meta charset = "utf-8">
    <title>Links and Images</title>
    <head>
        <Body>
            <h1>Homepage</h1>
            <P><a href="https://github.com/karnesh19zexx" target =_self>About Me in same tab (_self)</a></P>
            <a href="https://github.com/karnesh19zexx" target =_blank>About me in new tab (_blank)</a>
        <!--Here <a> is an anchor tag-->

        <!--The target url goes inside the tag and 
        the display text that is clickable will be placed out  -->

        <!--You may have noticed that we snuck in the rel attribute above. 
        This attribute is used to describe the relation between the current page and the linked document
         and can take multiple values. The most relevant ones to discuss right now are:

        noopener: Prevents the new tab from accessing the original page, which would have opened the possibility 
        of phishing attacks like tabnabbing. 
        Modern browsers all set this automatically for any links that have target="_blank", but you will often 
        still see this manually set for historic browser compatibility.

        noreferrer: The same as noopener but also prevents certain details about the original page from being 
        passed to the new page; referrer information is not always desirable to share.
        -->

        </Body>
    </head>
</html>
