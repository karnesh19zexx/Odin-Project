<!DOCTYPE html>
<html lang = "Eng">
    <meta charset ="utf-8">
    <title>Ordered & UnOrdered list</title>
    <head>
        <h1>This is unordered list using ul and li tag</h1>
        <body>
            <ul>
                <li>Dog</li>
                <li>Cat</li>
                <li>Horse</li>
                <li>Lion</li>
            </ul>
            <h5>ul - unordered list | li - list</h5>
            <h1> This is Ordered List</h1>
            <ol>
                <li>Chicken</li>
                <li>Egg</li>
                <li>Salmon</li>
                <li>Chick pea</li>
            </ol>
        </body>
    </head>
</html>
